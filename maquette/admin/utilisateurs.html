<!DOCTYPE html>
<html lang="fr" class="h-full bg-zinc-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des utilisateurs - StayFlow Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { accent: '#FF385C' } } }
        }
    </script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="font-sans antialiased text-zinc-800 bg-zinc-50 min-h-screen" x-data="adminUsers()">

    <div class="flex min-h-screen">
        <div data-include="sidebar"></div>

        <div class="flex-1 flex flex-col min-w-0">
            <!-- Navbar -->
            <div data-include="navbar"></div>

            <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto">
                <div class="max-w-7xl mx-auto">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-black text-zinc-950">Utilisateurs</h1>
                            <p class="text-sm text-zinc-400 mt-1" x-text="users.length + ' utilisateurs inscrits'"></p>
                        </div>
                        <div class="relative">
                            <input type="text" x-model="search" placeholder="Rechercher un utilisateur..."
                                   class="w-full sm:w-72 px-4 py-2.5 pl-10 bg-white border border-zinc-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-accent transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-zinc-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        </div>
                    </div>

                    <!-- Desktop table -->
                    <div class="hidden md:block bg-white rounded-2xl border border-zinc-200/60 shadow-sm overflow-hidden">
                        <table class="w-full text-sm">
                            <thead class="bg-zinc-50 text-xs text-zinc-500 font-bold uppercase tracking-wider">
                                <tr>
                                    <th class="text-left px-6 py-3">Utilisateur</th>
                                    <th class="text-left px-6 py-3">Rôle</th>
                                    <th class="text-left px-6 py-3">Inscrit le</th>
                                    <th class="text-left px-6 py-3">Réservations</th>
                                    <th class="text-right px-6 py-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-zinc-100">
                                <template x-for="user in filteredUsers()" :key="user.id">
                                    <tr class="hover:bg-zinc-50/50 transition">
                                        <td class="px-6 py-4">
                                            <div class="flex items-center gap-3">
                                                <img :src="user.avatar" class="w-9 h-9 rounded-full object-cover">
                                                <div>
                                                    <p class="font-semibold text-zinc-900" x-text="user.name"></p>
                                                    <p class="text-xs text-zinc-400" x-text="user.email"></p>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <span class="px-2 py-0.5 text-[11px] font-bold rounded-md"
                                                  :class="user.role === 'admin' ? 'bg-violet-100 text-violet-700' : user.role === 'proprietaire' ? 'bg-blue-100 text-blue-700' : 'bg-zinc-100 text-zinc-600'"
                                                  x-text="user.role"></span>
                                        </td>
                                        <td class="px-6 py-4 text-zinc-500" x-text="user.date"></td>
                                        <td class="px-6 py-4 font-semibold text-zinc-700" x-text="user.reservations"></td>
                                        <td class="px-6 py-4 text-right">
                                            <button @click="deleteUser(user.id)"
                                                    class="text-xs font-semibold text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-lg transition">
                                                Supprimer
                                            </button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <!-- Mobile cards -->
                    <div class="md:hidden space-y-3">
                        <template x-for="user in filteredUsers()" :key="'m-'+user.id">
                            <div class="bg-white rounded-2xl border border-zinc-200/60 shadow-sm p-4">
                                <div class="flex items-center gap-3 mb-3">
                                    <img :src="user.avatar" class="w-10 h-10 rounded-full object-cover">
                                    <div class="flex-1 min-w-0">
                                        <p class="font-semibold text-zinc-900 truncate" x-text="user.name"></p>
                                        <p class="text-xs text-zinc-400 truncate" x-text="user.email"></p>
                                    </div>
                                    <span class="px-2 py-0.5 text-[11px] font-bold rounded-md shrink-0"
                                          :class="user.role === 'admin' ? 'bg-violet-100 text-violet-700' : user.role === 'proprietaire' ? 'bg-blue-100 text-blue-700' : 'bg-zinc-100 text-zinc-600'"
                                          x-text="user.role"></span>
                                </div>
                                <div class="flex items-center justify-between text-xs text-zinc-400">
                                    <span x-text="'Inscrit le ' + user.date"></span>
                                    <span x-text="user.reservations + ' réservation(s)'"></span>
                                </div>
                                <button @click="deleteUser(user.id)" class="mt-3 w-full text-center text-xs font-semibold text-red-500 hover:text-red-700 hover:bg-red-50 py-2 rounded-lg transition border border-red-200">
                                    Supprimer cet utilisateur
                                </button>
                            </div>
                        </template>
                    </div>

                    <!-- Empty state -->
                    <div x-show="filteredUsers().length === 0" class="text-center py-16" style="display:none;">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-zinc-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                        <h3 class="text-lg font-bold text-zinc-900">Aucun utilisateur trouvé</h3>
                        <p class="text-sm text-zinc-400 mt-1">Essayez une autre recherche.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
