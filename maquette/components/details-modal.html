<!-- DETAILS MODAL — Multi-image gallery + Reserve button -->
<div x-show="detailModalOpen" class="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 sm:p-6" style="display: none;">
    <div class="fixed inset-0 bg-zinc-950/60 backdrop-blur-sm transition-opacity" @click="detailModalOpen = false"></div>

    <div x-show="detailModalOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         class="relative bg-white/95 backdrop-blur-md border border-zinc-200/80 rounded-3xl shadow-2xl max-w-3xl w-full overflow-y-auto max-h-[90vh] z-10 text-zinc-800">

        <button @click="detailModalOpen = false" class="absolute top-4 right-4 p-2 rounded-full bg-white/80 hover:bg-white text-zinc-500 hover:text-zinc-800 transition z-20 shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>

        <template x-if="selectedProperty">
            <div>
                <!-- Gallery -->
                <div class="relative h-64 sm:h-80 lg:h-96 w-full bg-zinc-100 overflow-hidden">
                    <template x-for="(img, idx) in selectedProperty.images" :key="idx">
                        <img :src="img" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-300"
                             :class="activeImageIndex === idx ? 'opacity-100' : 'opacity-0 pointer-events-none'">
                    </template>

                    <!-- Navigation arrows -->
                    <button x-show="selectedProperty.images.length > 1" @click.stop="prevImage()"
                            class="absolute left-3 top-1/2 -translate-y-1/2 p-2 rounded-full bg-white/80 hover:bg-white shadow-md transition z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <button x-show="selectedProperty.images.length > 1" @click.stop="nextImage()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 p-2 rounded-full bg-white/80 hover:bg-white shadow-md transition z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                    </button>

                    <!-- Image counter badge -->
                    <span class="absolute top-4 left-4 px-3 py-1 text-xs font-bold rounded-lg bg-black/50 text-white backdrop-blur-sm"
                          x-text="(activeImageIndex + 1) + ' / ' + selectedProperty.images.length"></span>

                    <!-- Availability badge -->
                    <span :class="selectedProperty.disponible ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                          class="absolute top-4 right-14 sm:right-14 px-2.5 py-1 text-xs font-bold rounded-lg border border-white/20 shadow-sm"
                          x-text="selectedProperty.disponible ? 'Disponible' : 'Indisponible'"></span>
                </div>

                <!-- Thumbnails strip -->
                <div x-show="selectedProperty.images.length > 1" class="flex gap-2 px-4 sm:px-6 pt-4 overflow-x-auto no-scrollbar">
                    <template x-for="(img, idx) in selectedProperty.images" :key="'th-'+idx">
                        <button @click.stop="goToImage(idx)"
                                class="shrink-0 w-16 h-16 rounded-xl overflow-hidden border-2 transition"
                                :class="activeImageIndex === idx ? 'border-blue-600 shadow-md' : 'border-transparent opacity-60 hover:opacity-100'">
                            <img :src="img" class="w-full h-full object-cover">
                        </button>
                    </template>
                </div>

                <!-- Details Body -->
                <div class="p-5 sm:p-8">
                    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-4">
                        <div>
                            <h2 class="text-2xl font-black text-zinc-950" x-text="selectedProperty.title"></h2>
                            <p class="text-sm text-zinc-500 mt-1" x-text="selectedProperty.location"></p>
                            <div class="flex items-center gap-3 text-xs text-zinc-400 mt-2">
                                <span x-text="selectedProperty.chambres + ' chambres'"></span>
                                <span>·</span>
                                <span x-text="selectedProperty.superficie + ' m²'"></span>
                                <span>·</span>
                                <span x-text="selectedProperty.capacite + ' personnes'"></span>
                            </div>
                        </div>
                        <div class="flex items-center gap-1 bg-zinc-50 px-3 py-1.5 rounded-xl border border-zinc-200/50 shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-amber-500 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                            <span class="font-bold text-sm text-zinc-800" x-text="selectedProperty.rating"></span>
                        </div>
                    </div>

                    <p class="text-sm text-zinc-600 mt-5 leading-relaxed border-t border-zinc-100 pt-5" x-text="selectedProperty.description"></p>

                    <!-- Pricing & CTA -->
                    <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between mt-8 border-t border-zinc-100 pt-6 gap-4">
                        <div>
                            <p class="text-xs text-zinc-400 font-bold uppercase tracking-wider">Tarif de base</p>
                            <p class="text-2xl font-black text-zinc-950 mt-0.5">
                                <span x-text="selectedProperty.price + ' €'"></span>
                                <span class="text-sm text-zinc-500 font-medium">/ nuit</span>
                            </p>
                        </div>
                        <a href="reservation.html"
                           @click="detailModalOpen = false"
                           class="inline-flex items-center justify-center gap-2 px-8 py-3.5 rounded-2xl text-white font-bold text-sm shadow-lg transition duration-200"
                           :class="selectedProperty.disponible ? 'bg-gradient-to-r from-blue-600 to-indigo-600 shadow-blue-500/20 hover:brightness-110' : 'bg-zinc-300 cursor-not-allowed opacity-60 pointer-events-none'">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            Réserver maintenant
                        </a>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
