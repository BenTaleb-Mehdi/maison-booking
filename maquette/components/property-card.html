<!--
    PROPERTY CARD COMPONENT
    ────────────────────────
    This file is a standalone reference of the card markup.
    Inside index.html the same markup is inlined inside <template x-for>
    because Alpine <template> elements use a DocumentFragment that the
    component loader cannot populate.

    When used inside x-for, each iteration has access to the `property`
    variable from the loop scope.
-->
<div class="group cursor-pointer flex flex-col gap-3" @click="openDetails(property)">
    <!-- Image Container -->
    <div class="relative aspect-square w-full rounded-2xl overflow-hidden bg-zinc-100 border border-zinc-200/50 shadow-sm">
        <img :src="property.image" :alt="property.title" class="h-full w-full object-cover group-hover:scale-105 transition-transform duration-500 ease-out">
        
        <!-- Favorite Heart Button -->
        <button @click.stop="toggleFavorite(property)" 
                class="absolute top-3 right-3 p-2 rounded-full bg-white/70 backdrop-blur-md shadow-sm hover:bg-white hover:scale-110 active:scale-95 transition duration-200 z-10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition duration-200" 
                 :class="property.favorited ? 'text-rose-500 fill-current' : 'text-zinc-600'" 
                 fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
        </button>

        <!-- Subtle availability badge -->
        <span :class="property.disponible ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'" 
              class="absolute bottom-3 left-3 px-2.5 py-1 text-[10px] font-extrabold rounded-lg tracking-wider uppercase backdrop-blur-sm bg-white/90 border border-white/20" 
              x-text="property.disponible ? 'Disponible' : 'Indisponible'"></span>
    </div>

    <!-- Meta Details -->
    <div class="flex flex-col gap-1">
        <div class="flex justify-between items-start">
            <h3 class="font-bold text-zinc-900 text-sm" x-text="property.title"></h3>
            <div class="flex items-center gap-1 text-xs">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-amber-500 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                <span class="font-bold text-zinc-800" x-text="property.rating"></span>
            </div>
        </div>
        <p class="text-xs text-zinc-400" x-text="property.location"></p>
        <div class="flex items-baseline gap-1 mt-1.5">
            <span class="text-sm font-extrabold text-zinc-950" x-text="property.price + ' €'"></span>
            <span class="text-xs text-zinc-400">/ nuit</span>
        </div>
    </div>
</div>
