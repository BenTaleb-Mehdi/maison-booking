<!-- CATEGORY TABS -->
<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10">
    <div class="flex items-center justify-between border-b border-zinc-200/60 pb-4">
        <div class="flex items-center gap-2 overflow-x-auto no-scrollbar py-2 w-full">
            <!-- Tab: Tous -->
            <button @click="activeTab = 'all'" 
                    :class="activeTab === 'all' ? 'bg-zinc-950 text-white shadow-md' : 'text-zinc-500 hover:bg-zinc-100 hover:text-zinc-900'"
                    class="flex items-center gap-2 px-5 py-3 rounded-full text-xs font-bold transition duration-200 shrink-0">
                Tous les séjours
            </button>

            <!-- Tab: Piscines -->
            <button @click="activeTab = 'pools'" 
                    :class="activeTab === 'pools' ? 'bg-zinc-950 text-white shadow-md' : 'text-zinc-500 hover:bg-zinc-100 hover:text-zinc-900'"
                    class="flex items-center gap-2 px-5 py-3 rounded-full text-xs font-bold transition duration-200 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
                Piscines d'exception
            </button>

            <!-- Tab: Bord de mer -->
            <button @click="activeTab = 'beachfront'" 
                    :class="activeTab === 'beachfront' ? 'bg-zinc-950 text-white shadow-md' : 'text-zinc-500 hover:bg-zinc-100 hover:text-zinc-900'"
                    class="flex items-center gap-2 px-5 py-3 rounded-full text-xs font-bold transition duration-200 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 002 2h2a2.5 2.5 0 002.5-2.5V14a2 2 0 00-2-2h-.5a2 2 0 01-2-2V5a2 2 0 00-2-2H9a3 3 0 00-3 3M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                Bord de mer
            </button>

            <!-- Tab: Cabanes -->
            <button @click="activeTab = 'cabins'" 
                    :class="activeTab === 'cabins' ? 'bg-zinc-950 text-white shadow-md' : 'text-zinc-500 hover:bg-zinc-100 hover:text-zinc-900'"
                    class="flex items-center gap-2 px-5 py-3 rounded-full text-xs font-bold transition duration-200 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-.778.099-1.533.284-2.253" /></svg>

            </button>
