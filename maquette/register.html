<!DOCTYPE html>
<html lang="fr" class="h-full bg-zinc-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - StayFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { accent: '#2563EB' } } }
        }
    </script>
</head>
<body class="font-sans antialiased text-zinc-800 bg-zinc-50 min-h-screen flex flex-col">

    <!-- Minimal top bar -->
    <header class="w-full border-b border-zinc-200/60 bg-white/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <span class="w-9 h-9 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-white font-black text-lg shadow-lg shadow-blue-500/20">S</span>
                <span class="bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent font-extrabold text-lg tracking-tight hidden sm:block">StayFlow</span>
            </a>
            <a href="login.html" class="text-sm font-semibold text-zinc-600 hover:text-blue-600 transition">Se connecter</a>
        </div>
    </header>

    <!-- Main content -->
    <main class="flex-1 flex items-center justify-center px-4 py-12 sm:py-16">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-3xl shadow-xl border border-zinc-200/60 p-6 sm:p-10">
                <!-- Header -->
                <div class="text-center mb-8">
                    <span class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-white font-black text-xl shadow-lg shadow-blue-500/20 mx-auto mb-4">S</span>
                    <h1 class="text-2xl font-black text-zinc-950">Créer un compte</h1>
                    <p class="text-sm text-zinc-400 mt-2">Rejoignez StayFlow en quelques secondes</p>
                </div>

                <!-- Form -->
                <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='index.html';">
                    <div>
                        <label class="block text-xs font-bold text-zinc-500 mb-1.5 uppercase tracking-wider">Nom complet</label>
                        <input type="text" required placeholder="Fatima Zahra"
                               class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-accent transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-zinc-500 mb-1.5 uppercase tracking-wider">Adresse e-mail</label>
                        <input type="email" required placeholder="exemple@mail.com"
                               class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-accent transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-zinc-500 mb-1.5 uppercase tracking-wider">Mot de passe</label>
                        <input type="password" required placeholder="8 caractères minimum" minlength="8"
                               class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-accent transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-zinc-500 mb-1.5 uppercase tracking-wider">Confirmer le mot de passe</label>
                        <input type="password" required placeholder="Retapez votre mot de passe" minlength="8"
                               class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-accent transition">
                    </div>

                    <!-- Role selection -->
                    <div>
                        <label class="block text-xs font-bold text-zinc-500 mb-2 uppercase tracking-wider">Je suis</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center gap-3 p-3 rounded-xl border-2 border-zinc-200 cursor-pointer has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50/50 transition">
                                <input type="radio" name="role" value="voyageur" checked class="text-blue-600 focus:ring-blue-500/20">
                                <div>
                                    <p class="text-sm font-bold text-zinc-900">Voyageur</p>
                                    <p class="text-[11px] text-zinc-400">Réserver des maisons</p>
                                </div>
                            </label>
                            <label class="flex items-center gap-3 p-3 rounded-xl border-2 border-zinc-200 cursor-pointer has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50/50 transition">
                                <input type="radio" name="role" value="proprietaire" class="text-blue-600 focus:ring-blue-500/20">
                                <div>
                                    <p class="text-sm font-bold text-zinc-900">Propriétaire</p>
                                    <p class="text-[11px] text-zinc-400">Louer ma maison</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <label class="flex items-start gap-2 cursor-pointer mt-2">
                        <input type="checkbox" required class="rounded border-zinc-300 text-blue-600 focus:ring-blue-500/20 mt-0.5">
                        <span class="text-xs text-zinc-500">J'accepte les <a href="#" class="text-blue-600 font-semibold hover:underline">Conditions d'utilisation</a> et la <a href="#" class="text-blue-600 font-semibold hover:underline">Politique de confidentialité</a></span>
                    </label>

                    <button type="submit" class="w-full py-3.5 rounded-xl bg-zinc-950 text-white font-bold text-sm hover:brightness-110 active:scale-[0.98] transition-all duration-200 mt-2">
                        Créer mon compte
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-4 my-6">
                    <div class="flex-1 h-px bg-zinc-200"></div>
                    <span class="text-xs text-zinc-400 font-medium">ou</span>
                    <div class="flex-1 h-px bg-zinc-200"></div>
                </div>

                <!-- Social -->
                <div class="grid grid-cols-2 gap-3">
                    <button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-zinc-200 bg-white hover:bg-zinc-50 text-sm font-semibold text-zinc-700 transition">
                        <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google
                    </button>
                    <button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-zinc-200 bg-white hover:bg-zinc-50 text-sm font-semibold text-zinc-700 transition">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/></svg>
                        Facebook
                    </button>
                </div>
            </div>

            <p class="text-center text-sm text-zinc-500 mt-6">
                Déjà un compte ?
                <a href="login.html" class="font-bold text-blue-600 hover:underline">Se connecter</a>
            </p>
        </div>
    </main>
</body>
</html>
