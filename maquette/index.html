<!doctype html>
<html lang="fr" class="h-full bg-zinc-50/50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StayFlow - Réservation de Maisons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
            colors: { accent: "#2563EB" },
          },
        },
      };
    </script>
    <style>
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="font-sans antialiased text-zinc-800 bg-zinc-50/40 min-h-screen"
    x-data="app()"
  >
    <!-- NAVBAR PLACEHOLDER -->
    <div data-include="navbar"></div>

    <!-- HERO & SEARCH -->
    <div data-include="hero-search"></div>

    <!-- CATEGORY TABS -->
    <div data-include="category-tabs"></div>

    <!-- PROPERTY GRID -->
    <main
      id="properties-grid"
      class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"
    >
      <div
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-10"
      >
        <template x-for="property in filteredProperties()" :key="property.id">
          <div
            class="group cursor-pointer flex flex-col gap-3"
            @click="openDetails(property)"
          >
            <div
              class="relative aspect-square w-full rounded-2xl overflow-hidden bg-zinc-100 border border-zinc-200/50 shadow-sm"
            >
              <img
                :src="property.images[0]"
                :alt="property.title"
                class="h-full w-full object-cover group-hover:scale-105 transition-transform duration-500 ease-out"
              />
              <button
                @click.stop="toggleFavorite(property)"
                class="absolute top-3 right-3 p-2 rounded-full bg-white/70 backdrop-blur-md shadow-sm hover:bg-white hover:scale-110 active:scale-95 transition duration-200 z-10"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-4 w-4 transition duration-200"
                  :class="property.favorited ? 'text-rose-500 fill-current' : 'text-zinc-600'"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
                  />
                </svg>
              </button>
              <span
                :class="property.disponible ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                class="absolute bottom-3 left-3 px-2.5 py-1 text-[10px] font-extrabold rounded-lg tracking-wider uppercase backdrop-blur-sm bg-white/90 border border-white/20"
                x-text="property.disponible ? 'Disponible' : 'Indisponible'"
              ></span>
              <!-- Multi-image indicator -->
              <span
                x-show="property.images.length > 1"
                class="absolute bottom-3 right-3 px-2 py-1 text-[10px] font-bold rounded-lg bg-black/50 text-white backdrop-blur-sm flex items-center gap-1"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-3 w-3"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                  />
                </svg>
                <span x-text="property.images.length"></span>
              </span>
            </div>
            <div class="flex flex-col gap-1">
              <div class="flex justify-between items-start">
                <h3
                  class="font-bold text-zinc-900 text-sm"
                  x-text="property.title"
                ></h3>
                <div class="flex items-center gap-1 text-xs">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-3.5 w-3.5 text-amber-500 fill-current"
                    viewBox="0 0 20 20"
                  >
                    <path
                      d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"
                    />
                  </svg>
                  <span
                    class="font-bold text-zinc-800"
                    x-text="property.rating"
                  ></span>
                </div>
              </div>
              <p class="text-xs text-zinc-400" x-text="property.location"></p>
              <div
                class="flex items-center gap-2 text-[11px] text-zinc-400 mt-0.5"
              >
                <span x-text="property.chambres + ' ch.'"></span>
                <span>·</span>
                <span x-text="property.capacite + ' pers.'"></span>
              </div>
              <div class="flex items-baseline gap-1 mt-1.5">
                <span
                  class="text-sm font-extrabold text-zinc-950"
                  x-text="property.price + ' €'"
                ></span>
                <span class="text-xs text-zinc-400">/ nuit</span>
              </div>
            </div>
          </div>
        </template>

        <div
          x-show="filteredProperties().length === 0"
          class="col-span-full py-16 text-center"
          style="display: none"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-12 w-12 text-zinc-300 mx-auto mb-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            />
          </svg>
          <h3 class="text-lg font-bold text-zinc-900">Aucun résultat trouvé</h3>
          <p class="text-sm text-zinc-400 mt-1">
            Essayez d'ajuster vos filtres de prix ou de destination.
          </p>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <div data-include="footer"></div>

    <!-- DETAILS MODAL (multi-image gallery + reserve button) -->
    <div data-include="details-modal"></div>

    <!-- TOAST -->
    <div
      x-show="toastShow"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-y-4"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-200"
      class="fixed bottom-5 right-5 z-50 bg-zinc-900/95 text-white backdrop-blur-md border border-zinc-800 px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 text-sm max-w-xs sm:max-w-sm"
      style="display: none"
    >
      <span
        class="w-2 h-2 rounded-full bg-emerald-500 shadow-md shadow-emerald-500/30 shrink-0"
      ></span>
      <span x-text="toastMessage" class="font-medium"></span>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
