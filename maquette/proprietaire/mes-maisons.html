<!DOCTYPE html>
<html lang="fr" class="h-full bg-zinc-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes maisons - StayFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { accent: '#2563EB' } } }
        }
    </script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="font-sans antialiased text-zinc-800 bg-zinc-50 min-h-screen" x-data="proprioManage()">

    <div class="flex min-h-screen">
        <div data-include="sidebar"></div>

        <div class="flex-1 flex flex-col min-w-0">
            <!-- Navbar -->
            <div data-include="navbar"></div>

            <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto">
                <div class="max-w-7xl mx-auto">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-black text-zinc-950">Mes maisons</h1>
                            <p class="text-sm text-zinc-400 mt-1" x-text="properties.length + ' propriété(s)'"></p>
                        </div>
                        <a href="ajouter.html" class="inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-sm shadow-lg shadow-blue-500/20 hover:brightness-110 transition shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                            Ajouter
                        </a>
                    </div>                    <!-- Filters and Search Toolbar -->
                    <div class="bg-white rounded-2xl border border-zinc-200/60 shadow-sm p-4 mb-6 flex flex-col md:flex-row items-center justify-between gap-4 font-sans">
                        <div class="relative w-full md:w-80">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-zinc-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                            </span>
                            <input type="text" x-model="searchQuery" @input="currentPage = 1" placeholder="Rechercher par titre ou ville..."
                                   class="w-full pl-10 pr-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-600 transition">
                        </div>
                        
                        <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                            <!-- Category Filter Combo Box -->
                            <div class="relative w-full md:w-56" x-data="{ open: false }">
                                <button type="button" @click="open = !open"
                                        class="w-full flex items-center justify-between px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-600 transition text-left text-zinc-700">
                                    <span class="flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2z" /></svg>
                                        <span x-text="selectedCategory === 'pools' ? 'Piscines d\'exception' : selectedCategory === 'beachfront' ? 'Bord de mer' : selectedCategory === 'cabins' ? 'Cabanes' : 'Toutes les catégories'"></span>
                                    </span>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-zinc-400 transition" :class="open ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
                                </button>
                                
                                <div x-show="open" @click.outside="open = false"
                                     x-transition:enter="transition ease-out duration-100"
                                     x-transition:enter-start="opacity-0 scale-95 -translate-y-2"
                                     x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                                     class="absolute left-0 mt-2 w-full bg-white border border-zinc-200 rounded-xl shadow-xl z-30 p-1 space-y-0.5"
                                     style="display: none;">
                                    <button type="button" @click="selectedCategory = ''; currentPage = 1; open = false;"
                                            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left text-sm text-zinc-700 hover:bg-zinc-50 transition"
                                            :class="selectedCategory === '' ? 'bg-blue-50 text-blue-600 font-semibold' : ''">
                                        Toutes les catégories
                                    </button>
                                    <button type="button" @click="selectedCategory = 'pools'; currentPage = 1; open = false;"
                                            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left text-sm text-zinc-700 hover:bg-zinc-50 transition"
                                            :class="selectedCategory === 'pools' ? 'bg-blue-50 text-blue-600 font-semibold' : ''">
                                        Piscines d'exception
                                    </button>
                                    <button type="button" @click="selectedCategory = 'beachfront'; currentPage = 1; open = false;"
                                            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left text-sm text-zinc-700 hover:bg-zinc-50 transition"
                                            :class="selectedCategory === 'beachfront' ? 'bg-blue-50 text-blue-600 font-semibold' : ''">
                                        Bord de mer
                                    </button>
                                    <button type="button" @click="selectedCategory = 'cabins'; currentPage = 1; open = false;"
                                            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left text-sm text-zinc-700 hover:bg-zinc-50 transition"
                                            :class="selectedCategory === 'cabins' ? 'bg-blue-50 text-blue-600 font-semibold' : ''">
                                        Cabanes
                                    </button>
                                </div>
                            </div>
                            
                            <!-- Status Filter Combo Box -->
                            <div class="relative w-full md:w-48" x-data="{ open: false }">
                                <button type="button" @click="open = !open"
                                        class="w-full flex items-center justify-between px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-600 transition text-left text-zinc-700">
                                    <span class="flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                        <span x-text="selectedStatus === 'disponible' ? 'Disponible' : selectedStatus === 'indisponible' ? 'Indisponible' : 'Tous les statuts'"></span>
                                    </span>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-zinc-400 transition" :class="open ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
                                </button>
                                
                                <div x-show="open" @click.outside="open = false"
                                     x-transition:enter="transition ease-out duration-100"
                                     x-transition:enter-start="opacity-0 scale-95 -translate-y-2"
                                     x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                                     class="absolute left-0 mt-2 w-full bg-white border border-zinc-200 rounded-xl shadow-xl z-30 p-1 space-y-0.5"
                                     style="display: none;">
                                    <button type="button" @click="selectedStatus = ''; currentPage = 1; open = false;"
                                            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left text-sm text-zinc-700 hover:bg-zinc-50 transition"
                                            :class="selectedStatus === '' ? 'bg-blue-50 text-blue-600 font-semibold' : ''">
                                        Tous les statuts
                                    </button>
                                    <button type="button" @click="selectedStatus = 'disponible'; currentPage = 1; open = false;"
                                            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left text-sm text-zinc-700 hover:bg-zinc-50 transition"
                                            :class="selectedStatus === 'disponible' ? 'bg-blue-50 text-blue-600 font-semibold' : ''">
                                        Disponible
                                    </button>
                                    <button type="button" @click="selectedStatus = 'indisponible'; currentPage = 1; open = false;"
                                            class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left text-sm text-zinc-700 hover:bg-zinc-50 transition"
                                            :class="selectedStatus === 'indisponible' ? 'bg-blue-50 text-blue-600 font-semibold' : ''">
                                        Indisponible
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Desktop table -->
                    <div class="hidden md:block bg-white rounded-2xl border border-zinc-200/60 shadow-sm overflow-hidden">
                        <table class="w-full text-sm">
                            <thead class="bg-zinc-50 text-xs text-zinc-500 font-bold uppercase tracking-wider">
                                <tr>
                                    <th class="text-left px-6 py-3">Propriété</th>
                                    <th class="text-left px-6 py-3">Catégorie</th>
                                    <th class="text-left px-6 py-3">Photos</th>
                                    <th class="text-left px-6 py-3">Statut</th>
                                    <th class="text-right px-6 py-3">Prix</th>
                                    <th class="text-right px-6 py-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-zinc-100">
                                <template x-for="p in paginatedProperties" :key="p.id">
                                    <tr class="hover:bg-zinc-50/50 transition">
                                        <td class="px-6 py-4">
                                            <div class="flex items-center gap-3">
                                                <img :src="p.images[0]" class="w-12 h-12 rounded-xl object-cover shrink-0">
                                                <div class="min-w-0">
                                                    <p class="font-bold text-zinc-900 truncate" x-text="p.title"></p>
                                                    <p class="text-xs text-zinc-400" x-text="p.location"></p>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <span class="px-2 py-0.5 text-[11px] font-bold rounded-md bg-zinc-100 text-zinc-600" x-text="p.category === 'pools' ? 'Piscine d\'exception' : p.category === 'beachfront' ? 'Bord de mer' : 'Cabane'"></span>
                                        </td>
                                        <td class="px-6 py-4 text-zinc-500" x-text="p.images.length"></td>
                                        <td class="px-6 py-4">
                                            <span class="px-2 py-0.5 text-[11px] font-bold rounded-md"
                                                  :class="p.disponible ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                                                  x-text="p.disponible ? 'Disponible' : 'Indisponible'"></span>
                                        </td>
                                        <td class="px-6 py-4 text-right font-bold text-zinc-900" x-text="p.price + ' €'"></td>
                                        <td class="px-6 py-4 text-right flex items-center justify-end gap-1">
                                            <!-- Toggle availability -->
                                            <button @click="toggleAvailability(p)" :title="p.disponible ? 'Désactiver' : 'Activer'"
                                                     class="inline-flex items-center justify-center p-2 rounded-xl transition-all duration-200 text-zinc-500 hover:text-zinc-800 hover:bg-zinc-100">
                                                <svg x-show="p.disponible" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                                </svg>
                                                <svg x-show="!p.disponible" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                                                </svg>
                                            </button>
                                            
                                            <!-- Edit button -->
                                            <a :href="'modifier.html?id=' + p.id" title="Modifier"
                                               class="inline-flex items-center justify-center p-2 rounded-xl text-blue-600 hover:text-blue-800 hover:bg-blue-50 transition-all duration-200">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                                </svg>
                                            </a>

                                            <!-- Delete button -->
                                            <button @click="deleteProperty(p.id)" title="Supprimer"
                                                     class="inline-flex items-center justify-center p-2 rounded-xl text-red-500 hover:text-red-700 hover:bg-red-50 transition-all duration-200">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                </svg>
                                            </button>
                                        </td>
                                    </tr>
                                </template>
                                
                                <!-- Empty state row -->
                                <tr x-show="filteredProperties.length === 0" style="display: none;">
                                    <td colspan="6" class="px-6 py-16 text-center">
                                        <div class="flex flex-col items-center justify-center gap-3 font-sans">
                                            <div class="w-12 h-12 rounded-2xl bg-zinc-50 border border-zinc-100 flex items-center justify-center text-zinc-400">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                                                </svg>
                                            </div>
                                            <p class="text-sm font-semibold text-zinc-900">Aucun résultat trouvé</p>
                                            <p class="text-xs text-zinc-400">Essayez de modifier vos filtres ou votre recherche.</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Mobile cards -->
                    <div class="md:hidden space-y-3">
                        <template x-for="p in paginatedProperties" :key="'m-'+p.id">
                            <div class="bg-white rounded-2xl border border-zinc-200/60 shadow-sm overflow-hidden">
                                <img :src="p.images[0]" class="w-full h-48 object-cover">
                                <div class="p-4">
                                    <div class="flex items-start justify-between gap-3">
                                        <div class="min-w-0">
                                            <h3 class="font-bold text-zinc-900 truncate" x-text="p.title"></h3>
                                            <p class="text-xs text-zinc-400" x-text="p.location"></p>
                                        </div>
                                        <p class="font-black text-zinc-950 shrink-0" x-text="p.price + ' €'"></p>
                                    </div>
                                    <div class="flex items-center gap-2 mt-3">
                                        <span class="px-2 py-0.5 text-[11px] font-bold rounded-md"
                                              :class="p.disponible ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                                              x-text="p.disponible ? 'Disponible' : 'Indisponible'"></span>
                                        <span class="text-[11px] text-zinc-400" x-text="p.images.length + ' photo(s)'"></span>
                                    </div>
                                    <div class="flex gap-2 mt-4">
                                        <!-- Toggle availability mobile -->
                                        <button @click="toggleAvailability(p)" class="flex-grow flex items-center justify-center gap-1.5 py-2 text-xs font-semibold rounded-lg border border-zinc-200 text-zinc-600 hover:bg-zinc-50 transition"
                                                :class="p.disponible ? 'text-zinc-700' : 'text-zinc-400'">
                                            <svg x-show="p.disponible" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                            </svg>
                                            <svg x-show="!p.disponible" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                                            </svg>
                                            <span x-text="p.disponible ? 'Masquer' : 'Afficher'"></span>
                                        </button>
                                        
                                        <!-- Edit button mobile -->
                                        <a :href="'modifier.html?id=' + p.id" class="py-2 px-3 text-xs font-semibold text-blue-600 border border-blue-200 rounded-lg hover:bg-blue-50 transition flex items-center justify-center gap-1.5">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                            </svg>
                                            Modifier
                                        </a>
                                        
                                        <!-- Delete button mobile -->
                                        <button @click="deleteProperty(p.id)" class="py-2 px-3 text-xs font-semibold text-red-500 border border-red-200 rounded-lg hover:bg-red-50 transition flex items-center justify-center gap-1.5">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                            Supprimer
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                        
                        <!-- Mobile Empty state -->
                        <div x-show="filteredProperties.length === 0" class="bg-white rounded-2xl border border-zinc-200/60 shadow-sm p-8 text-center" style="display: none;">
                            <div class="flex flex-col items-center justify-center gap-3 font-sans">
                                <div class="w-12 h-12 rounded-2xl bg-zinc-50 border border-zinc-100 flex items-center justify-center text-zinc-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                                    </svg>
                                </div>
                                <p class="text-sm font-semibold text-zinc-900">Aucun résultat trouvé</p>
                                <p class="text-xs text-zinc-400">Essayez de modifier vos filtres ou votre recherche.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Pagination Component -->
                    <div x-show="totalPages > 1" class="mt-6 flex flex-col sm:flex-row items-center justify-between gap-4 font-sans bg-white px-6 py-4 rounded-2xl border border-zinc-200/60 shadow-sm" style="display: none;">
                        <p class="text-xs text-zinc-500 font-medium">
                            Affichage de <span class="font-bold text-zinc-900" x-text="((currentPage - 1) * itemsPerPage + 1)"></span> à 
                            <span class="font-bold text-zinc-900" x-text="Math.min(currentPage * itemsPerPage, filteredProperties.length)"></span> sur 
                            <span class="font-bold text-zinc-900" x-text="filteredProperties.length"></span> maisons
                        </p>
                        <div class="flex items-center gap-1">
                            <button @click="prevPage()" :disabled="currentPage === 1"
                                    class="p-2 rounded-xl border border-zinc-200 hover:bg-zinc-50 disabled:opacity-50 disabled:hover:bg-transparent text-zinc-600 transition">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                                </svg>
                            </button>
                            <template x-for="p in totalPages" :key="'page-'+p">
                                <button @click="goToPage(p)"
                                        x-text="p"
                                        :class="currentPage === p ? 'bg-blue-600 text-white font-bold border-blue-600 shadow-lg shadow-blue-500/20' : 'border-zinc-200 text-zinc-600 hover:bg-zinc-50'"
                                        class="w-9 h-9 flex items-center justify-center rounded-xl border text-xs font-semibold transition">
                                </button>
                            </template>
                            <button @click="nextPage()" :disabled="currentPage === totalPages"
                                    class="p-2 rounded-xl border border-zinc-200 hover:bg-zinc-50 disabled:opacity-50 disabled:hover:bg-transparent text-zinc-600 transition">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Modern Confirm Delete Modal -->
                    <div x-show="confirmOpen" x-transition class="fixed inset-0 z-[100] flex items-center justify-center bg-zinc-950/65 backdrop-blur-sm p-4" style="display: none;">
                        <div x-transition:enter="transition ease-out duration-200" 
                             x-transition:enter-start="opacity-0 scale-95" 
                             x-transition:enter-end="opacity-100 scale-100"
                             @click.outside="confirmOpen = false"
                             class="bg-white rounded-3xl shadow-2xl border border-zinc-200/60 p-6 max-w-sm w-full text-center font-sans">
                             <div class="w-12 h-12 rounded-2xl bg-red-50 flex items-center justify-center mx-auto mb-4 text-red-600">
                                 <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                                     <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                 </svg>
                             </div>
                             <h3 class="text-base font-black text-zinc-950" x-text="confirmTitle"></h3>
                             <p class="text-xs text-zinc-400 mt-2 leading-relaxed" x-text="confirmMessage"></p>
                             <div class="flex gap-2.5 mt-5">
                                 <button @click="confirmAction(); confirmOpen = false;" 
                                         class="flex-1 py-2.5 rounded-xl bg-red-600 text-white font-bold text-xs hover:bg-red-700 active:scale-[0.98] transition">
                                     Confirmer
                                 </button>
                                 <button @click="confirmOpen = false" 
                                         class="flex-1 py-2.5 rounded-xl border border-zinc-200 text-zinc-600 font-bold text-xs hover:bg-zinc-50 transition">
                                     Annuler
                                 </button>
                             </div>
                        </div>
                    </div>

                    <!-- Modern Toast Alerts -->
                    <div class="fixed bottom-5 right-5 z-[110] flex flex-col gap-2 max-w-sm w-full pointer-events-none">
                        <template x-for="t in toasts" :key="t.id">
                            <div x-show="t.visible" x-transition
                                 class="flex items-center gap-3 p-4 bg-white border border-zinc-200/80 shadow-2xl rounded-2xl pointer-events-auto font-sans border-l-4"
                                 :class="t.type === 'success' ? 'border-l-green-600' : t.type === 'error' ? 'border-l-red-600' : 'border-l-blue-600'">
                                 <!-- Icon success -->
                                 <span x-show="t.type === 'success'" class="text-green-600 shrink-0">
                                     <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                                 </span>
                                 <!-- Icon error -->
                                 <span x-show="t.type === 'error'" class="text-red-600 shrink-0">
                                     <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                                 </span>
                                 <!-- Icon info -->
                                 <span x-show="t.type === 'info'" class="text-blue-600 shrink-0">
                                     <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                 </span>
                                 <span class="text-xs font-bold text-zinc-800" x-text="t.message"></span>
                            </div>
                        </template>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script src="js/proprietaire.js"></script>
</body>
</html>
