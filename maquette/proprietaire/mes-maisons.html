<!DOCTYPE html>
<html lang="fr" class="h-full bg-zinc-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes maisons - StayFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { accent: '#FF385C' } } }
        }
    </script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="font-sans antialiased text-zinc-800 bg-zinc-50 min-h-screen" x-data="proprioManage()">

    <div class="flex min-h-screen">
        <div data-include="sidebar"></div>

        <div class="flex-1 flex flex-col min-w-0">
            <!-- Navbar -->
            <div data-include="navbar"></div>

            <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto">
                <div class="max-w-7xl mx-auto">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-black text-zinc-950">Mes maisons</h1>
                            <p class="text-sm text-zinc-400 mt-1" x-text="properties.length + ' propriété(s)'"></p>
                        </div>
                        <a href="ajouter.html" class="inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold text-sm shadow-lg shadow-indigo-500/20 hover:brightness-110 transition shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                            Ajouter
                        </a>
                    </div>

                    <!-- Desktop table -->
                    <div class="hidden md:block bg-white rounded-2xl border border-zinc-200/60 shadow-sm overflow-hidden">
                        <table class="w-full text-sm">
                            <thead class="bg-zinc-50 text-xs text-zinc-500 font-bold uppercase tracking-wider">
                                <tr>
                                    <th class="text-left px-6 py-3">Propriété</th>
                                    <th class="text-left px-6 py-3">Catégorie</th>
                                    <th class="text-left px-6 py-3">Photos</th>
                                    <th class="text-left px-6 py-3">Statut</th>
                                    <th class="text-right px-6 py-3">Prix</th>
                                    <th class="text-right px-6 py-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-zinc-100">
                                <template x-for="p in properties" :key="p.id">
                                    <tr class="hover:bg-zinc-50/50 transition">
                                        <td class="px-6 py-4">
                                            <div class="flex items-center gap-3">
                                                <img :src="p.images[0]" class="w-12 h-12 rounded-xl object-cover shrink-0">
                                                <div class="min-w-0">
                                                    <p class="font-bold text-zinc-900 truncate" x-text="p.title"></p>
                                                    <p class="text-xs text-zinc-400" x-text="p.location"></p>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <span class="px-2 py-0.5 text-[11px] font-bold rounded-md bg-zinc-100 text-zinc-600" x-text="p.category"></span>
                                        </td>
                                        <td class="px-6 py-4 text-zinc-500" x-text="p.images.length"></td>
                                        <td class="px-6 py-4">
                                            <span class="px-2 py-0.5 text-[11px] font-bold rounded-md"
                                                  :class="p.disponible ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                                                  x-text="p.disponible ? 'Disponible' : 'Indisponible'"></span>
                                        </td>
                                        <td class="px-6 py-4 text-right font-bold text-zinc-900" x-text="p.price + ' €'"></td>
                                        <td class="px-6 py-4 text-right">
                                            <button @click="toggleAvailability(p)" class="text-xs font-semibold px-3 py-1.5 rounded-lg transition"
                                                    :class="p.disponible ? 'text-amber-600 hover:bg-amber-50' : 'text-green-600 hover:bg-green-50'"
                                                    x-text="p.disponible ? 'Désactiver' : 'Activer'"></button>
                                            <button @click="deleteProperty(p.id)" class="text-xs font-semibold text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-lg transition ml-1">
                                                Supprimer
                                            </button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <!-- Mobile cards -->
                    <div class="md:hidden space-y-3">
                        <template x-for="p in properties" :key="'m-'+p.id">
                            <div class="bg-white rounded-2xl border border-zinc-200/60 shadow-sm overflow-hidden">
                                <img :src="p.images[0]" class="w-full h-48 object-cover">
                                <div class="p-4">
                                    <div class="flex items-start justify-between gap-3">
                                        <div class="min-w-0">
                                            <h3 class="font-bold text-zinc-900 truncate" x-text="p.title"></h3>
                                            <p class="text-xs text-zinc-400" x-text="p.location"></p>
                                        </div>
                                        <p class="font-black text-zinc-950 shrink-0" x-text="p.price + ' €'"></p>
                                    </div>
                                    <div class="flex items-center gap-2 mt-3">
                                        <span class="px-2 py-0.5 text-[11px] font-bold rounded-md"
                                              :class="p.disponible ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                                              x-text="p.disponible ? 'Disponible' : 'Indisponible'"></span>
                                        <span class="text-[11px] text-zinc-400" x-text="p.images.length + ' photo(s)'"></span>
                                    </div>
                                    <div class="flex gap-2 mt-4">
                                        <button @click="toggleAvailability(p)" class="flex-1 py-2 text-xs font-semibold rounded-lg border transition"
                                                :class="p.disponible ? 'border-amber-200 text-amber-600 hover:bg-amber-50' : 'border-green-200 text-green-600 hover:bg-green-50'"
                                                x-text="p.disponible ? 'Désactiver' : 'Activer'"></button>
                                        <button @click="deleteProperty(p.id)" class="py-2 px-4 text-xs font-semibold text-red-500 border border-red-200 rounded-lg hover:bg-red-50 transition">Supprimer</button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/proprietaire.js"></script>
</body>
</html>
