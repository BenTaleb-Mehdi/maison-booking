<!DOCTYPE html>
<html lang="fr" class="h-full bg-zinc-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Dashboard - StayFlow Propriétaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { accent: '#2563EB' } } }
        }
    </script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="font-sans antialiased text-zinc-800 bg-zinc-50 min-h-screen" x-data="proprioApp()">

    <div class="flex min-h-screen">
        <div data-include="sidebar"></div>

        <div class="flex-1 flex flex-col min-w-0">
            <!-- Navbar -->
            <div data-include="navbar"></div>

            <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto">
                <div class="max-w-7xl mx-auto">
                    <div class="mb-8">
                        <h1 class="text-2xl sm:text-3xl font-black text-zinc-950">Bonjour, Youssef 👋</h1>
                        <p class="text-sm text-zinc-400 mt-1">Voici un résumé de votre activité</p>
                    </div>

                    <!-- Stats -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 mb-8">
                        <div class="bg-white rounded-2xl border border-zinc-200/60 shadow-sm p-5 sm:p-6">
                            <div class="w-11 h-11 rounded-xl bg-blue-50 flex items-center justify-center mb-4">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                            </div>
                            <p class="text-2xl sm:text-3xl font-black text-zinc-950">4</p>
                            <p class="text-xs text-zinc-400 mt-1 font-medium">Mes maisons</p>
                        </div>
                        <div class="bg-white rounded-2xl border border-zinc-200/60 shadow-sm p-5 sm:p-6">
                            <div class="w-11 h-11 rounded-xl bg-rose-50 flex items-center justify-center mb-4">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-rose-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            </div>
                            <p class="text-2xl sm:text-3xl font-black text-zinc-950">12</p>
                            <p class="text-xs text-zinc-400 mt-1 font-medium">Réservations reçues</p>
                        </div>
                        <div class="bg-white rounded-2xl border border-zinc-200/60 shadow-sm p-5 sm:p-6">
                            <div class="w-11 h-11 rounded-xl bg-green-50 flex items-center justify-center mb-4">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </div>
                            <p class="text-2xl sm:text-3xl font-black text-zinc-950">9</p>
                            <p class="text-xs text-zinc-400 mt-1 font-medium">Séjours terminés</p>
                        </div>
                        <div class="bg-white rounded-2xl border border-zinc-200/60 shadow-sm p-5 sm:p-6">
                            <div class="w-11 h-11 rounded-xl bg-amber-50 flex items-center justify-center mb-4">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </div>
                            <p class="text-2xl sm:text-3xl font-black text-zinc-950">3 840 €</p>
                            <p class="text-xs text-zinc-400 mt-1 font-medium">Revenus ce mois</p>
                        </div>
                    </div>

                    <!-- My properties preview -->
                    <div class="bg-white rounded-2xl border border-zinc-200/60 shadow-sm overflow-hidden">
                        <div class="px-5 sm:px-6 py-4 border-b border-zinc-100 flex items-center justify-between">
                            <h2 class="font-bold text-zinc-900">Mes propriétés</h2>
                            <a href="mes-maisons.html" class="text-xs font-semibold text-blue-600 hover:underline">Gérer</a>
                        </div>
                        <div class="divide-y divide-zinc-100">
                            <template x-for="p in properties" :key="p.id">
                                <div class="flex items-center gap-4 px-5 sm:px-6 py-4 hover:bg-zinc-50/50 transition">
                                    <img :src="p.images[0]" class="w-14 h-14 sm:w-16 sm:h-16 rounded-xl object-cover shrink-0">
                                    <div class="flex-1 min-w-0">
                                        <p class="font-bold text-zinc-900 text-sm truncate" x-text="p.title"></p>
                                        <p class="text-xs text-zinc-400" x-text="p.location"></p>
                                        <div class="flex items-center gap-2 mt-1">
                                            <span class="px-1.5 py-0.5 text-[10px] font-bold rounded"
                                                  :class="p.disponible ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                                                  x-text="p.disponible ? 'Disponible' : 'Indisponible'"></span>
                                            <span class="text-[11px] text-zinc-400" x-text="p.images.length + ' photo(s)'"></span>
                                        </div>
                                    </div>
                                    <p class="font-black text-zinc-950 text-sm shrink-0" x-text="p.price + ' €/nuit'"></p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/proprietaire.js"></script>
</body>
</html>
