<!-- PROPRIETAIRE NAVBAR -->
<header class="h-16 bg-white/80 backdrop-blur-md border-b border-zinc-200/60 flex items-center px-4 sm:px-6 gap-4 shrink-0 sticky top-0 z-40">
    <!-- Mobile hamburger -->
    <button @click="$dispatch('toggle-sidebar')" class="lg:hidden p-2 rounded-xl hover:bg-zinc-100 transition text-zinc-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
    </button>

    <!-- Search -->
    <div class="flex-1 max-w-md">
        <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-zinc-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            <input type="text" placeholder="Rechercher..." class="w-full pl-10 pr-4 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
        </div>
    </div>

    <!-- Right actions -->
    <div class="flex items-center gap-2 sm:gap-3 shrink-0">
        <!-- Add property shortcut -->
        <a href="ajouter.html" class="hidden sm:inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white text-sm font-bold shadow-md shadow-indigo-500/15 hover:brightness-110 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
            Ajouter
        </a>

        <!-- Notifications -->
        <button class="relative p-2 rounded-xl hover:bg-zinc-100 transition text-zinc-500 hover:text-zinc-900">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full"></span>
        </button>

        <!-- Profile dropdown -->
        <div class="relative" @click.outside="profileOpen = false" x-data="{ profileOpen: false }">
            <button @click="profileOpen = !profileOpen" class="flex items-center gap-2 p-1.5 rounded-xl hover:bg-zinc-100 transition">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=100&q=80" class="w-8 h-8 rounded-full object-cover">
                <div class="hidden sm:block text-left">
                    <p class="text-sm font-semibold text-zinc-900 leading-tight">Youssef Benani</p>
                    <p class="text-[11px] text-zinc-400">Propriétaire</p>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-zinc-400 hidden sm:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
            </button>

            <div x-show="profileOpen" x-cloak
                 x-transition:enter="transition ease-out duration-150"
                 x-transition:enter-start="opacity-0 scale-95 -translate-y-2"
                 x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-100"
                 x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                 x-transition:leave-end="opacity-0 scale-95 -translate-y-2"
                 class="absolute right-0 mt-2 w-56 bg-white border border-zinc-200 rounded-2xl shadow-xl py-2 z-50 text-sm">
                <div class="px-4 py-2.5 border-b border-zinc-100">
                    <p class="font-bold text-zinc-900">Youssef Benani</p>
                    <p class="text-xs text-zinc-400">youssef@email.com</p>
                </div>
                <div class="py-1">
                    <a href="index.html" class="block px-4 py-2 hover:bg-zinc-100 transition text-zinc-700">Dashboard</a>
                    <a href="mes-maisons.html" class="block px-4 py-2 hover:bg-zinc-100 transition text-zinc-700">Mes maisons</a>
                    <a href="ajouter.html" class="block px-4 py-2 hover:bg-zinc-100 transition text-zinc-700">Ajouter une maison</a>
                    <a href="../admin/index.html" class="block px-4 py-2 hover:bg-zinc-100 transition text-zinc-700">Admin Panel</a>
                    <a href="../index.html" class="block px-4 py-2 hover:bg-zinc-100 transition text-zinc-700">Retour au site</a>
                </div>
                <div class="border-t border-zinc-100 my-1"></div>
                <div class="py-1">
                    <a href="../login.html" class="block px-4 py-2 hover:bg-zinc-100 transition text-rose-500 font-semibold">Déconnexion</a>
                </div>
            </div>
        </div>
    </div>
</header>
